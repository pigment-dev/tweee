# Build the extension bundles, stamp a version, deploy the site to GitHub Pages,
# and commit the rebuilt files back so a plain `git pull` always has the latest.
name: Deploy to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write   # commit rebuilt bundles back
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Stamp version.json (auto-increments the patch each deploy)
        env:
          SHA: ${{ github.sha }}
          RUN: ${{ github.run_number }}
        run: |
          node -e '
            const fs=require("fs");
            const h=fs.readFileSync("index.html","utf8");
            const base=(h.match(/VERSION="([^"]+)"/)||[])[1]||"0.0.0";
            const mm=base.split(".").slice(0,2).join(".");      // major.minor from index.html
            const version=mm+"."+(process.env.RUN||"0");          // e.g. 2.5.<run number>
            const build=(process.env.SHA||"dev").slice(0,7);
            fs.writeFileSync("version.json", JSON.stringify({version,build},null,2)+"\n");
            console.log("version.json ->", version, build);
          '

      - name: Repackage extension zips
        run: |
          (cd extension-firefox && zip -r -X ../tweee-firefox.xpi . -x ".DS_Store" -x "*/.DS_Store")
          (cd extension-chrome  && zip -r -X ../tweee-chrome.zip  . -x ".DS_Store" -x "*/.DS_Store")

      - name: Commit rebuilt files back
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json extension-firefox extension-chrome tweee-firefox.xpi tweee-chrome.zip
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore: rebuild bundles + version stamp [skip ci]"
            git push || echo "push skipped (non-fast-forward)"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
